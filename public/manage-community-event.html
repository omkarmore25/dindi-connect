  <script src="/js/main.js?v=51.95"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const evId = urlParams.get('id');
      if (!evId) return window.location.href = '/dashboard.html';

      const uRes = await fetch('/api/auth/current_user');
      const uData = await uRes.json();
      if (!uData.isAuthenticated) return window.location.href = '/';
      const user = uData.user;

      const eRes = await fetch('/api/community-events/' + evId);
      if (!eRes.ok) return window.location.href = '/dashboard.html';
      const ev = await eRes.json();
      if (ev.userId !== user._id) return window.location.href = '/dashboard.html';

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('eventContent').classList.remove('hidden');

      document.getElementById('evTitle').textContent = ev.eventName || '';
      document.getElementById('evTypeBadge').textContent = ev.eventType || '';
      
      // Date display: single day or multi-day
      const startDate = new Date(ev.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
      const endDate = ev.endDate ? new Date(ev.endDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : null;
      document.getElementById('evDate').textContent = endDate ? `${startDate} – ${endDate}` : startDate;

      document.getElementById('evVenue').textContent = ev.venue || '';
      document.getElementById('evOrganizer').textContent = 'By ' + (ev.organizer || '');
      document.getElementById('evDesc').textContent = ev.description || '';
      document.getElementById('evDeadline').textContent = ev.deadline ? new Date(ev.deadline).toLocaleDateString() : '-';
      document.getElementById('evFood').textContent = ev.foodProvided ? '✅ Yes' : '❌ No';
      document.getElementById('evFee').textContent = ev.entryFee ? `₹${ev.entryFeeAmount}` : 'Free';
      
      if (ev.contacts && ev.contacts.length > 0) {
        const grid = document.getElementById('manageContactsGrid');
        ev.contacts.forEach(c => {
          grid.insertAdjacentHTML('beforeend', `
            <div><span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Contact Person</span><span class="font-semibold">${c.name}</span></div>
            <div><span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Contact Number</span><span class="font-semibold">${c.phone}</span></div>
          `);
        });
      }

      // Photos
      if (ev.photos && ev.photos.length > 0) {
        document.getElementById('photosSection').classList.remove('hidden');
        const grid = document.getElementById('evPhotosGrid');
        ev.photos.forEach(url => {
          const div = document.createElement('div');
          div.className = 'aspect-video rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 shadow-xl hover:scale-[1.02] transition-transform duration-300 group relative mb-4';
          div.innerHTML = `
            <img src="${url}" class="w-full h-full object-cover cursor-pointer">
            <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center pointer-events-none">
               <div class="p-3 bg-white/20 backdrop-blur-md rounded-full text-white opacity-0 group-hover:opacity-100 transition-all transform translate-y-4 group-hover:translate-y-0">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
               </div>
            </div>
          `;
          grid.appendChild(div);
        });
      }

      document.getElementById('editEventBtn').onclick = () => {
        window.location.href = '/edit-community-event.html?id=' + evId;
      };
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const compId = urlParams.get('id');
      if (!compId) return window.location.href = '/auth.html';

      const uRes = await fetch('/api/auth/current_user');
      const uData = await uRes.json();
      if (!uData.isAuthenticated) return window.location.href = '/';
      const user = uData.user;

      const cRes = await fetch('/api/competitions/' + compId);
      const comp = await cRes.json();
      if (comp.organizerId !== user._id) return window.location.href = '/auth.html';

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('compContent').classList.remove('hidden');

      document.getElementById('compTitle').textContent = comp.title || '';
      const typeBadge = document.getElementById('compTypeBadge');
      if (typeBadge && comp.eventType) { typeBadge.textContent = comp.eventType + ' Competition'; }
      document.getElementById('compDate').textContent = comp.date ? new Date(comp.date).toLocaleDateString() : '';
      document.getElementById('compLoc').textContent = comp.location || '';
      document.getElementById('participantCount').textContent = comp.registeredGroups.length;

      const tbody = document.getElementById('participantsList');
      if (comp.registeredGroups.length === 0) {
         document.getElementById('noParticipantsMsg').classList.remove('hidden');
      } else {
         comp.registeredGroups.forEach(rg => {
            const tr = document.createElement('tr');
            tr.className = 'border-b border-slate-100 dark:border-slate-200 dark:border-slate-800  dark:hover:bg-slate-800/50 transition';
            tr.innerHTML = `<td class="py-4 px-5 font-bold text-slate-800 dark:text-slate-200">${rg.groupName}</td>` +
                           `<td class="py-4 px-5 text-slate-600 dark:text-slate-400">${rg.village || '-'}</td>` +
                           `<td class="py-4 px-5 text-slate-600 dark:text-slate-400">${rg.leaderName || '-'}</td>` +
                           `<td class="py-4 px-5">
                              <a href="https://wa.me/${rg.contactNumber}" target="_blank" 
                                 class="inline-flex items-center gap-2 px-5 py-2.5 bg-green-500/5 hover:bg-green-500/20 font-bold rounded-full border-2 border-[#25D366]/40 hover:border-[#25D366] transition-all hover:scale-105 active:scale-95 group"
                                 style="color: #25D366 !important;">
                                 <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" style="color: #25D366 !important;">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.885-9.885 9.885m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                                 </svg>
                                 Message
                              </a>
                           </td>`;
            tbody.appendChild(tr);
         });
      }

      document.getElementById('openEditModalBtn').onclick = () => {
         window.location.href = '/edit-competition.html?id=' + compId;
      };

    });
  </script>

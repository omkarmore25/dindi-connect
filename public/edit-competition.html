<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Event - Dindi</title>
  
  <link href="/css/style.css" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@3.11.1/dist/geosearch.css" />
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
    
    body {
      background-image: radial-gradient(at 0% 0%, rgba(251,146,60,0.1) 0px, transparent 50%),
                        radial-gradient(at 100% 0%, rgba(234,88,12,0.1) 0px, transparent 50%);
      background-attachment: fixed;
      transition: background-color 0.3s ease, color 0.3s ease;
      font-family: 'Outfit', sans-serif;
    }
    
    .dark body {
      background-image: radial-gradient(at 0% 0%, rgba(251,146,60,0.15) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(79,70,229,0.15) 0px, transparent 50%);
    }

    /* Modal Open Support */
    body.modal-open {
      overflow: hidden !important;
      position: fixed;
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
    }
    .map-modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 999999;
      background-color: rgba(15, 23, 42, 0.9);
      display: flex; flex-direction: column;
    }
    .map-modal-overlay.hidden { display: none !important; }

    .glass-nav { 
      background: rgba(255, 255, 255, 0.75); 
      backdrop-filter: blur(16px); 
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .dark .glass-nav {
      background: rgba(15, 23, 42, 0.75);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    
    .dark .glass-card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }

    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Scrollbar Styling */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
  </style>
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col md:flex-row pb-32 md:pb-0">

  <!-- Desktop Sidebar -->
  <header class="bg-slate-950 sticky top-0 z-50 w-full md:w-72 md:h-screen md:fixed md:flex md:flex-col md:border-r border-slate-800 px-4 py-3 md:p-6 shadow-2xl flex justify-between items-center md:items-start transition-colors">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-brand-400 to-brand-600 text-white flex items-center justify-center font-bold text-xl shadow-lg shadow-brand-500/30 font-serif">D</div>
      <h1 class="text-xl md:text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-brand-500 to-red-500 tracking-tighter">Dindi</h1>
    </div>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex flex-col gap-2 mt-10 w-full">
      <a href="/" class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition font-medium">Home</a>
      <a href="/calendar.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition font-medium">Calendar</a>
      <a href="/auth.html" class="mt-4 flex items-center justify-center gap-3 px-4 py-3 bg-brand-500 text-white font-bold rounded-2xl shadow-lg shadow-brand-500/20 hover:bg-brand-600 transition cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Dashboard
      </a>
    </nav>

    <div class="flex items-center gap-3 md:mt-auto md:w-full md:justify-between">
      <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition text-slate-500 dark:text-slate-400" aria-label="Toggle Dark Mode">
        <svg id="themeToggleDarkIcon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        <svg id="themeToggleLightIcon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 2.32a1 1 0 011.415 1.415l-.707.707a1 1 0 01-1.414-1.414l.707-.707zm-9.855.707a1 1 0 010-1.414l.707-.707a1 1 0 111.414 1.414l-.707.707a1 1 0 01-1.414 0zM10 6a4 4 0 100 8 4 4 0 000-8zm-5 4a1 1 0 11-2 0 1 1 0 012 0zm14 0a1 1 0 11-2 0 1 1 0 012 0zm-5.657 5.657a1 1 0 010 1.414l-.707.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-2.32a1 1 0 01-1.415-1.415l.707-.707a1 1 0 011.414 1.414l-.707.707z" clip-rule="evenodd"></path></svg>
      </button>
    </div>
  </header>

  <!-- Content Area -->
  <div class="flex-1 md:ml-72 flex flex-col min-h-screen px-4 md:px-8 py-8 relative">
    <div class="max-w-4xl w-full mx-auto relative z-10 animate-fade-in transition-all">
        <div id="loadingState" class="py-20 text-center">
            <div class="inline-block relative w-16 h-16"><div class="absolute inset-0 border-4 border-slate-200 dark:border-slate-800 rounded-full"></div><div class="absolute inset-0 border-4 border-brand-500 rounded-full border-t-transparent animate-spin"></div></div>
        </div>
      
        <div id="compContent" class="hidden flex flex-col gap-6">
            <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-2xl relative overflow-hidden">
                
                <div class="mb-8 border-b border-slate-100 dark:border-slate-800 pb-5">
                    <h2 class="text-3xl font-black text-slate-800 dark:text-slate-100 mb-2">Edit Event Details</h2>
                    <p class="text-slate-500 dark:text-slate-400">Update information and manage photos for your competition.</p>
                </div>
                
                <form id="editEventForm" class="space-y-6">
                   <div>
                      <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Event Title</label>
                      <input type="text" id="editCompTitle" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 transition text-slate-800 dark:text-slate-100 font-medium" required>
                   </div>
                   <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                      <div>
                         <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Event Date</label>
                         <input type="date" id="editCompDate" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 transition text-slate-800 dark:text-slate-100 font-medium" required>
                      </div>
                      <div>
                         <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Location</label>
                         <input type="text" id="editCompLoc" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 transition text-slate-800 dark:text-slate-100 font-medium" required>
                      </div>
                   </div>
                   
                   <div class="relative z-0">
                      <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Map Location (Optional)</label>
                      <button type="button" id="openEditMapBtn" class="w-full bg-slate-50 dark:bg-slate-800 border border-brand-200 dark:border-brand-800 rounded-xl px-4 py-3 text-brand-600 dark:text-brand-400 font-bold hover:bg-brand-50 dark:hover:bg-brand-900/30 transition flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span id="editMapBtnText">Pick Location on Map</span>
                      </button>
                      <input type="hidden" id="editCompLat">
                      <input type="hidden" id="editCompLng">
                      <button type="button" id="editCompClearMap" class="w-full mt-2 p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800/30 rounded-xl font-bold hover:bg-red-100 dark:hover:bg-red-900/40 transition hidden">Clear Location</button>
                   </div>
                   <div>
                      <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Registration Deadline</label>
                      <input type="date" id="editCompDeadline" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 transition text-slate-800 dark:text-slate-100 font-medium" required>
                   </div>
                   <div>
                      <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Description & Rules</label>
                      <textarea id="editCompDesc" rows="8" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 transition text-slate-800 dark:text-slate-100 font-medium" required></textarea>
                   </div>
                   
                   <div class="border-t border-slate-100 dark:border-slate-800 pt-6 mt-4">
                      <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">Event Gallery</label>
                      <div id="editCompGallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 mb-5 min-h-[50px]"></div>
                      <input type="file" id="editCompPhotos" accept="image/*" multiple class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 cursor-pointer text-sm font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 transition">
                   </div>
                   
                   <div class="pt-6 border-t border-slate-100 dark:border-slate-800">
                      <button type="submit" id="editCompSubmitBtn" class="w-full bg-brand-500 text-white font-bold py-4 rounded-xl shadow-xl shadow-brand-500/20 hover:bg-brand-600 transition flex items-center justify-center gap-2 text-lg">Save Changes</button>
                   </div>
                </form>
            </div>
        </div>
    </div>
  </div>

  <!-- Full Screen Map Modal -->
  <div id="mapPickerModal" class="map-modal-overlay hidden">
    <div class="bg-white dark:bg-slate-800 p-4 flex justify-between items-center shadow-md z-10 relative">
      <h3 class="font-bold text-lg text-slate-800 dark:text-slate-100">Select Location</h3>
      <button type="button" id="closeMapModalBtn" class="p-2 bg-slate-100 dark:bg-slate-700 rounded-full hover:bg-slate-200 dark:hover:bg-slate-600 transition">
        <svg class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <div id="globalMapContainer" class="flex-1 w-full bg-slate-200 relative z-0"></div>
    <div class="bg-white dark:bg-slate-800 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-10 relative flex gap-4">
      <button type="button" id="confirmMapBtn" class="flex-1 py-3.5 bg-brand-500 text-white font-bold rounded-xl shadow-lg hover:bg-brand-600 transition">Confirm Location</button>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-geosearch@3.11.1/dist/bundle.min.js"></script>

  <script src="/js/main.js?v=11"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const compId = urlParams.get('id');
      if (!compId) return window.location.href = '/auth.html';

      const uRes = await fetch('/api/auth/current_user');
      const uData = await uRes.json();
      if (!uData.isAuthenticated) return window.location.href = '/';
      const user = uData.user;

      const cRes = await fetch('/api/competitions/' + compId);
      const comp = await cRes.json();
      if (comp.organizerId !== user._id) return window.location.href = '/auth.html';

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('compContent').classList.remove('hidden');

      document.getElementById('editCompTitle').value = comp.title || '';
      document.getElementById('editCompDate').value = comp.date ? comp.date.split('T')[0] : '';
      document.getElementById('editCompLoc').value = comp.location || '';
      document.getElementById('editCompDeadline').value = comp.registrationDeadline ? comp.registrationDeadline.split('T')[0] : '';
      document.getElementById('editCompDesc').value = comp.description || '';

      if (comp.locationCoordinates && comp.locationCoordinates.lat && comp.locationCoordinates.lng) {
          document.getElementById('editCompLat').value = comp.locationCoordinates.lat;
          document.getElementById('editCompLng').value = comp.locationCoordinates.lng;
          const textSpan = document.getElementById('editMapBtnText');
          textSpan.textContent = '📍 Location Selected';
          textSpan.classList.remove('text-brand-600', 'dark:text-brand-400');
          textSpan.classList.add('text-green-600', 'dark:text-green-400');
          document.getElementById('editCompClearMap').classList.remove('hidden');
      }

      document.getElementById('openEditMapBtn').onclick = () => {
         window.openMapModal('editCompLat', 'editCompLng', 'editMapBtnText', 'editCompClearMap');
      };
      
      const editClearBtn = document.getElementById('editCompClearMap');
      editClearBtn.onclick = () => {
         document.getElementById('editCompLat').value = '';
         document.getElementById('editCompLng').value = '';
         const textSpan = document.getElementById('editMapBtnText');
         textSpan.textContent = 'Pick Location on Map';
         textSpan.classList.add('text-brand-600', 'dark:text-brand-400');
         textSpan.classList.remove('text-green-600', 'dark:text-green-400');
         editClearBtn.classList.add('hidden');
      };
         
      const gallery = document.getElementById('editCompGallery');
      gallery.innerHTML = '';
      (comp.photos || []).forEach(url => {
         const div = document.createElement('div');
         div.className = 'relative aspect-square border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden';
         div.innerHTML = `<img src="${url}" class="w-full h-full object-cover">` +
                         `<button type="button" class="del-btn" data-url="${url}" style="position:absolute;top:5px;right:5px;background:#ef4444;color:white;border-radius:8px;padding:6px;font-size:10px;font-weight:bold;z-index:30;border:1px solid white;cursor:pointer;">DEL</button>`;
         gallery.appendChild(div);
      });

      let toDelete = [];
      document.addEventListener('click', (e) => {
         if (e.target.classList.contains('del-btn')) {
            toDelete.push(e.target.dataset.url); e.target.closest('.relative').remove();
         }
      });


      document.getElementById('editEventForm').onsubmit = async (e) => {
         e.preventDefault();
         const btn = document.getElementById('editCompSubmitBtn');
         btn.disabled = true; btn.textContent = 'Saving...';
         try {
            const payload = {
               title: document.getElementById('editCompTitle').value,
               date: document.getElementById('editCompDate').value,
               location: document.getElementById('editCompLoc').value,
               registrationDeadline: document.getElementById('editCompDeadline').value,
               description: document.getElementById('editCompDesc').value,
               deletePhotos: toDelete
            };
            const cLat = document.getElementById('editCompLat').value;
            const cLng = document.getElementById('editCompLng').value;
            if (cLat && cLng) {
               payload.locationCoordinates = { lat: Number(cLat), lng: Number(cLng) };
            } else {
               payload.locationCoordinates = null; // To clear it if removed
            }
            await fetch('/api/competitions/' + compId, {
               method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            const photos = document.getElementById('editCompPhotos').files;
            if (photos.length > 0) {
              for (let f of photos) {
                const fd = new FormData(); fd.append('photo', f);
                await fetch('/api/competitions/' + compId + '/photos', { method: 'POST', body: fd });
              }
            }
            window.location.href = '/manage-competition.html?id=' + compId;
         } catch(err) { alert('Failed'); btn.disabled = false; btn.textContent = 'Save Changes'; }
      };
    });
  </script>
  </script>



</body>
</html>

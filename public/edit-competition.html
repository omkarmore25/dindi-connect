  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const compId = urlParams.get('id');
      if (!compId) return window.location.href = '/auth.html';

      const uRes = await fetch('/api/auth/current_user');
      const uData = await uRes.json();
      if (!uData.isAuthenticated) return window.location.href = '/';
      const user = uData.user;

      const cRes = await fetch('/api/competitions/' + compId);
      const comp = await cRes.json();
      if (comp.organizerId !== user._id) return window.location.href = '/auth.html';

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('compContent').classList.remove('hidden');

      document.getElementById('editCompTitle').value = comp.title || '';
      document.getElementById('editCompDate').value = comp.date ? comp.date.split('T')[0] : '';
      document.getElementById('editCompLoc').value = comp.location || '';
      document.getElementById('editCompDeadline').value = comp.registrationDeadline ? comp.registrationDeadline.split('T')[0] : '';
      document.getElementById('editCompDesc').value = comp.description || '';

      if (comp.locationCoordinates && comp.locationCoordinates.lat && comp.locationCoordinates.lng) {
          document.getElementById('editCompLat').value = comp.locationCoordinates.lat;
          document.getElementById('editCompLng').value = comp.locationCoordinates.lng;
          const textSpan = document.getElementById('editMapBtnText');
          textSpan.textContent = '📍 Location Selected';
          textSpan.classList.remove('text-brand-600', 'dark:text-brand-400');
          textSpan.classList.add('text-green-600', 'dark:text-green-400');
          document.getElementById('editCompClearMap').classList.remove('hidden');
      }

      document.getElementById('openEditMapBtn').onclick = () => {
         window.openMapModal('editCompLat', 'editCompLng', 'editMapBtnText', 'editCompClearMap');
      };
      
      const editClearBtn = document.getElementById('editCompClearMap');
      editClearBtn.onclick = () => {
         document.getElementById('editCompLat').value = '';
         document.getElementById('editCompLng').value = '';
         const textSpan = document.getElementById('editMapBtnText');
         textSpan.textContent = 'Pick Location on Map';
         textSpan.classList.add('text-brand-600', 'dark:text-brand-400');
         textSpan.classList.remove('text-green-600', 'dark:text-green-400');
         editClearBtn.classList.add('hidden');
      };
         
      const gallery = document.getElementById('editCompGallery');
      gallery.innerHTML = '';
      (comp.photos || []).forEach(url => {
         const div = document.createElement('div');
         div.className = 'relative aspect-square border border-slate-200 dark:border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden';
         div.innerHTML = `<img src="${url}" class="w-full h-full object-cover">` +
                         `<button type="button" class="photo-del-btn" data-url="${url}" title="Delete Photo">` +
                         `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>` +
                         `</button>`;
         gallery.appendChild(div);
      });

      let toDelete = [];
      document.addEventListener('click', (e) => {
         const delBtn = e.target.closest('.photo-del-btn');
         if (delBtn) {
            toDelete.push(delBtn.dataset.url); 
            delBtn.closest('.relative').remove();
         }
      });


      document.getElementById('editEventForm').onsubmit = async (e) => {
         e.preventDefault();
         const btn = document.getElementById('editCompSubmitBtn');
         btn.disabled = true; btn.textContent = 'Saving...';
         try {
            const payload = {
               title: document.getElementById('editCompTitle').value,
               date: document.getElementById('editCompDate').value,
               location: document.getElementById('editCompLoc').value,
               registrationDeadline: document.getElementById('editCompDeadline').value,
               description: document.getElementById('editCompDesc').value,
               deletePhotos: toDelete
            };
            const cLat = document.getElementById('editCompLat').value;
            const cLng = document.getElementById('editCompLng').value;
            if (cLat && cLng) {
               payload.locationCoordinates = { lat: Number(cLat), lng: Number(cLng) };
            } else {
               payload.locationCoordinates = null; // To clear it if removed
            }
            await fetch('/api/competitions/' + compId, {
               method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            const photos = document.getElementById('editCompPhotos').files;
            if (photos.length > 0) {
              for (let f of photos) {
                const fd = new FormData(); fd.append('photo', f);
                await fetch('/api/competitions/' + compId + '/photos', { method: 'POST', body: fd });
              }
            }
            window.location.href = '/manage-competition.html?id=' + compId;
         } catch(err) { alert('Failed'); btn.disabled = false; btn.textContent = 'Save Changes'; }
      };
    });
  </script>
  
  
  
  <!-- PWA Install Banner (Mobile) -->
  <div id="installMobileBanner" class="hidden md:hidden fixed bottom-24 left-0 right-0 mx-auto w-[90%] max-w-sm glass-card p-4 rounded-2xl shadow-2xl border border-brand-200/50 dark:border-brand-500/30 animate-fade-in" style="z-index: 9999;">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-brand-500 to-orange-500 text-white flex items-center justify-center font-bold text-xl shrink-0 shadow-lg shadow-brand-500/20">V</div>
      <div class="flex-1 min-w-0">
        <h4 class="text-sm font-black text-slate-800 dark:text-slate-100">Install Vandan</h4>
        <p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium truncate">Fast, secure & offline access</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="dismissInstallBanner" class="p-2 text-slate-400 hover:text-slate-600 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <button id="installMobileBtn" class="px-4 py-2 bg-brand-500 text-white text-[10px] font-black rounded-lg shadow-lg shadow-brand-500/30">INSTALL</button>
      </div>
    </div>
  </div>
</body>

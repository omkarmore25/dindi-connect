<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Dindi</title>
  <meta name="description" content="Reset your Dindi Connect account password.">
  <meta name="robots" content="noindex">
  
  <link href="/css/style.css" rel="stylesheet">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
    
    body {
      background-image: radial-gradient(at 0% 0%, rgba(251,146,60,0.1) 0px, transparent 50%),
                        radial-gradient(at 100% 0%, rgba(234,88,12,0.1) 0px, transparent 50%);
      background-attachment: fixed;
      transition: background-color 0.3s ease, color 0.3s ease;
      font-family: 'Outfit', sans-serif;
    }
    
    .dark body {
      background-image: radial-gradient(at 0% 0%, rgba(251,146,60,0.15) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(79,70,229,0.15) 0px, transparent 50%);
    }

    .glass-nav { 
      background: rgba(255, 255, 255, 0.75); 
      backdrop-filter: blur(16px); 
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .dark .glass-nav {
      background: rgba(15, 23, 42, 0.75);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    
    .dark .glass-card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .dark .glass-input {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }

    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col md:flex-row pb-32 md:pb-0">

  <!-- Desktop Sidebar -->
  <header class="bg-slate-950 sticky top-0 z-50 w-full md:w-72 md:h-screen md:fixed md:flex md:flex-col md:border-r border-slate-800 px-4 py-3 md:p-6 shadow-2xl flex justify-between items-center md:items-start transition-colors">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-brand-400 to-brand-600 text-white flex items-center justify-center font-bold text-xl shadow-lg shadow-brand-500/30 font-serif">D</div>
      <h1 class="text-xl md:text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-brand-500 to-red-500 tracking-tighter">Dindi</h1>
    </div>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex flex-col gap-2 mt-10 w-full">
      <a href="/" class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition font-medium">Home</a>
      <a href="/calendar.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition font-medium">Calendar</a>
    </nav>

    <div class="flex items-center gap-3 md:mt-auto md:w-full md:justify-between">
      <button id="themeToggle" class="rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition text-slate-500 dark:text-slate-400" aria-label="Toggle Dark Mode">
        <svg id="themeToggleDarkIcon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
        <svg id="themeToggleLightIcon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5" />
          <circle cx="12" cy="3" r="1.5" />
          <circle cx="12" cy="21" r="1.5" />
          <circle cx="3" cy="12" r="1.5" />
          <circle cx="21" cy="12" r="1.5" />
          <circle cx="5.636" cy="5.636" r="1.5" />
          <circle cx="18.364" cy="18.364" r="1.5" />
          <circle cx="5.636" cy="18.364" r="1.5" />
          <circle cx="18.364" cy="5.636" r="1.5" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <div class="flex-1 md:ml-72 flex flex-col justify-center min-h-screen px-4 py-8 relative">
    
    <div class="max-w-md w-full mx-auto relative z-10">
      
      <!-- Status Messages -->
      <div id="statusMessage" class="hidden mb-6 p-4 rounded-2xl text-sm font-semibold shadow-md transition-all text-center"></div>

      <div class="text-center mb-8">
        <h2 class="text-4xl font-extrabold mb-2 tracking-tight">Create New Password</h2>
        <p class="text-slate-500 dark:text-slate-400">Enter a secure new password for your account</p>
      </div>

      <div class="glass-card rounded-3xl p-6 md:p-8 animate-fade-in shadow-2xl shadow-brand-500/10">
        
        <form id="resetPasswordForm" class="flex flex-col gap-4">
          <input type="password" id="newPassword" placeholder="New Password" required minlength="6" class="p-4 glass-input rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-500 transition shadow-sm placeholder-slate-400 dark:placeholder-slate-500">
          <input type="password" id="confirmPassword" placeholder="Confirm New Password" required minlength="6" class="p-4 glass-input rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-500 transition shadow-sm placeholder-slate-400 dark:placeholder-slate-500">
          
          <button type="submit" id="resetSubmitBtn" class="mt-2 py-4 bg-brand-500 hover:bg-brand-600 text-white font-bold rounded-2xl shadow-lg shadow-brand-500/30 transition transform hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50">Reset Password</button>
        </form>
        
        <div id="successMessage" class="hidden text-center mt-4">
          <a href="/auth.html" class="inline-block py-4 px-8 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-800 dark:text-slate-100 font-bold rounded-2xl shadow-sm transition">Proceed to Log In</a>
        </div>
      </div>
      
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('resetPasswordForm').classList.add('hidden');
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.classList.remove('hidden');
            statusMsg.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400');
            statusMsg.innerHTML = 'Invalid or missing reset token. Please request a new password reset link.';
            return;
        }

        const resetForm = document.getElementById('resetPasswordForm');
        
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('resetSubmitBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            // Clear previous errors
            statusMsg.classList.add('hidden');
            statusMsg.classList.remove('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400', 'bg-green-100', 'text-green-700', 'dark:bg-green-900/30', 'dark:text-green-400');

            if (password !== confirmPassword) {
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400');
                statusMsg.innerHTML = 'Passwords do not match.';
                return;
            }

            if (password.length < 6) {
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400');
                statusMsg.innerHTML = 'Password must be at least 6 characters.';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                
                statusMsg.classList.remove('hidden');
                if (res.ok) {
                    statusMsg.classList.add('bg-green-100', 'text-green-700', 'dark:bg-green-900/30', 'dark:text-green-400');
                    statusMsg.innerHTML = data.message;
                    resetForm.classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                } else {
                    statusMsg.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400');
                    statusMsg.innerHTML = data.error || 'Failed to reset password.';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (err) {
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400');
                statusMsg.innerHTML = 'A network error occurred. Please try again.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    });
  </script>
</body>
</html>

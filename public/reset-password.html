  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('resetPasswordForm').classList.add('hidden');
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.classList.remove('hidden');
            statusMsg.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400');
            statusMsg.innerHTML = 'Invalid or missing reset token. Please request a new password reset link.';
            return;
        }

        const resetForm = document.getElementById('resetPasswordForm');
        
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('resetSubmitBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            // Clear previous errors
            statusMsg.classList.add('hidden');
            statusMsg.classList.remove('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400', 'bg-green-100', 'text-green-700', 'dark:bg-green-900/30', 'dark:text-green-400');

            if (password !== confirmPassword) {
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400');
                statusMsg.innerHTML = 'Passwords do not match.';
                return;
            }

            if (password.length < 6) {
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400');
                statusMsg.innerHTML = 'Password must be at least 6 characters.';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                
                statusMsg.classList.remove('hidden');
                if (res.ok) {
                    statusMsg.classList.add('bg-green-100', 'text-green-700', 'dark:bg-green-900/30', 'dark:text-green-400');
                    statusMsg.innerHTML = data.message;
                    resetForm.classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                } else {
                    statusMsg.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400');
                    statusMsg.innerHTML = data.error || 'Failed to reset password.';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (err) {
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-900/30', 'dark:text-red-400');
                statusMsg.innerHTML = 'A network error occurred. Please try again.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    });
  </script>

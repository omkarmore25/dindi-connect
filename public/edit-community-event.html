  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const evId = urlParams.get('id');
      if (!evId) return window.location.href = '/dashboard.html';

      const uRes = await fetch('/api/auth/current_user');
      const uData = await uRes.json();
      if (!uData.isAuthenticated) return window.location.href = '/';
      const user = uData.user;

      const eRes = await fetch('/api/community-events/' + evId);
      if (!eRes.ok) return window.location.href = '/dashboard.html';
      const ev = await eRes.json();
      if (ev.userId !== user._id) return window.location.href = '/dashboard.html';

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('formContent').classList.remove('hidden');

      // Populate fields
      document.getElementById('eName').value = ev.eventName || '';
      document.getElementById('eOrganizer').value = ev.organizer || '';
      document.getElementById('eType').value = ev.eventType || 'Other';
      document.getElementById('eVenue').value = ev.venue || '';
      document.getElementById('eDate').value = ev.date ? ev.date.split('T')[0] : '';
      document.getElementById('eEndDate').value = ev.endDate ? ev.endDate.split('T')[0] : '';
      document.getElementById('eDeadline').value = ev.deadline ? ev.deadline.split('T')[0] : '';
      document.getElementById('eDesc').value = ev.description || '';
      document.getElementById('eFoodProvided').checked = ev.foodProvided || false;
      document.getElementById('eEntryFee').checked = ev.entryFee || false;
      if (ev.entryFee) {
        document.getElementById('eEntryFeeAmountContainer').classList.remove('hidden');
        document.getElementById('eEntryFeeAmount').value = ev.entryFeeAmount || 0;
      }

      document.getElementById('eEntryFee').onchange = (e) => {
        if (e.target.checked) {
          document.getElementById('eEntryFeeAmountContainer').classList.remove('hidden');
        } else {
          document.getElementById('eEntryFeeAmountContainer').classList.add('hidden');
        }
      };

      // Contacts
      const contactsContainer = document.getElementById('editCEContactsContainer');
      const addContactBtn = document.getElementById('editCEAddContactBtn');

      const createContactRow = (name = '', phone = '') => {
        const row = document.createElement('div');
        row.className = 'flex gap-4 contact-row animate-fade-in relative group';
        row.innerHTML = `
          <div class="flex-1">
            <input type="text" class="ce-contact-name w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-slate-800 dark:text-slate-100 font-medium" placeholder="Name" value="${name}" required>
          </div>
          <div class="flex-1">
            <input type="tel" class="ce-contact-phone w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-slate-800 dark:text-slate-100 font-medium" placeholder="Phone" value="${phone}" required>
          </div>
          <button type="button" class="remove-contact-btn absolute -right-2 -top-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition shadow-lg scale-0 group-hover:scale-100">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        `;
        row.querySelector('.remove-contact-btn').onclick = () => row.remove();
        contactsContainer.appendChild(row);
      };

      if (ev.contacts && ev.contacts.length > 0) {
        ev.contacts.forEach(c => createContactRow(c.name, c.phone));
      } else {
        createContactRow();
      }

      addContactBtn.onclick = () => createContactRow();

      // Gallery
      const gallery = document.getElementById('editCEGallery');
      let toDelete = [];
      (ev.photos || []).forEach(url => {
        const div = document.createElement('div');
        div.className = 'relative aspect-square border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden';
        div.innerHTML = `<img src="${url}" class="w-full h-full object-cover">` +
          `<button type="button" class="photo-del-btn" data-url="${url}" title="Delete Photo">` +
          `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>` +
          `</button>`;
        gallery.appendChild(div);
      });

      document.addEventListener('click', (e) => {
        const delBtn = e.target.closest('.photo-del-btn');
        if (delBtn) {
          toDelete.push(delBtn.dataset.url);
          delBtn.closest('.relative').remove();
        }
      });

      document.getElementById('editCEForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('editCESubmitBtn');
        btn.disabled = true; btn.textContent = 'Saving...';

        const contactNames = Array.from(document.querySelectorAll('.ce-contact-name')).map(i => i.value);
        const contactPhones = Array.from(document.querySelectorAll('.ce-contact-phone')).map(i => i.value);
        const contacts = contactNames.map((name, i) => ({ name, phone: contactPhones[i] }));

        try {
          const endDateVal = document.getElementById('eEndDate').value;
          const payload = {
            eventName: document.getElementById('eName').value,
            organizer: document.getElementById('eOrganizer').value,
            eventType: document.getElementById('eType').value,
            venue: document.getElementById('eVenue').value,
            date: document.getElementById('eDate').value,
            endDate: endDateVal || null,
            deadline: document.getElementById('eDeadline').value,
            description: document.getElementById('eDesc').value,
            foodProvided: document.getElementById('eFoodProvided').checked,
            entryFee: document.getElementById('eEntryFee').checked,
            entryFeeAmount: document.getElementById('eEntryFee').checked ? (document.getElementById('eEntryFeeAmount').value || 0) : 0,
            contacts,
            deletePhotos: toDelete
          };

          await fetch('/api/community-events/' + evId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          // Upload new photos
          const photos = document.getElementById('editCEPhotos').files;
          for (let f of photos) {
            const fd = new FormData();
            fd.append('photo', f);
            await fetch('/api/community-events/' + evId + '/photos', { method: 'POST', body: fd });
          }

          window.location.href = '/manage-community-event.html?id=' + evId;
        } catch(err) {
          alert('Failed to save changes.');
          btn.disabled = false;
          btn.textContent = 'Save Changes';
        }
      };
    });
  </script>
</body>
</html>

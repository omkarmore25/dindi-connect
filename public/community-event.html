  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const evId = new URLSearchParams(window.location.search).get('id');
      if (!evId) return window.location.href = '/calendar.html';

      try {
        const res = await fetch('/api/community-events/' + evId);
        if (!res.ok) return window.location.href = '/calendar.html';
        const ev = await res.json();

        document.title = `${ev.eventName} - Vandan`;
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('eventContent').classList.remove('hidden');

        document.getElementById('evTitle').textContent = ev.eventName;
        document.getElementById('evTypeBadge').textContent = ev.eventType;
        document.getElementById('evOrganizer').textContent = 'Organized by ' + ev.organizer;
        document.getElementById('evDesc').textContent = ev.description;
        // Contact Rendering
        const infoGrid = document.querySelector('.grid.grid-cols-2.gap-4.text-sm');
        // Clear existing contact fields (keep Deadline and Entry)
        infoGrid.innerHTML = `
          <div><span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Registration Closes</span><span id="evDeadline" class="font-semibold text-slate-700 dark:text-slate-300"></span></div>
          <div><span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Entry</span><span id="evFeeText" class="font-semibold text-slate-700 dark:text-slate-300"></span></div>
        `;

        if (ev.contacts && ev.contacts.length > 0) {
          ev.contacts.forEach(c => {
            infoGrid.insertAdjacentHTML('beforeend', `
              <div><span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Contact Person</span><span class="font-semibold text-slate-700 dark:text-slate-300">${c.name}</span></div>
              <div><span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Phone</span><a href="tel:${c.phone}" class="font-semibold text-blue-500 hover:underline">${c.phone}</a></div>
            `);
          });
        }

        // Date range
        const opts = { day: 'numeric', month: 'long', year: 'numeric' };
        const startStr = new Date(ev.date).toLocaleDateString('en-IN', opts);
        const endStr = ev.endDate ? ' – ' + new Date(ev.endDate).toLocaleDateString('en-IN', opts) : '';
        document.getElementById('evDate').textContent = startStr + endStr;

        document.getElementById('evVenue').textContent = ev.venue;
        document.getElementById('evDeadline').textContent = ev.deadline ? new Date(ev.deadline).toLocaleDateString('en-IN', opts) : 'Open';

        if (ev.foodProvided) document.getElementById('evFoodBadge').classList.remove('hidden');
        const feeBadge = document.getElementById('evFeeBadge');
        const feeText = document.getElementById('evFeeText');
        if (ev.entryFee && ev.entryFeeAmount > 0) {
          feeBadge.textContent = '₹' + ev.entryFeeAmount + ' Entry';
          feeBadge.className = 'text-[11px] uppercase font-black px-3 py-2 rounded-xl bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400';
          feeText.textContent = '₹' + ev.entryFeeAmount;
        } else {
          feeText.textContent = 'Free';
        }

        // Posters
        if (ev.photos && ev.photos.length > 0) {
          document.getElementById('posterSection').classList.remove('hidden');
          const grid = document.getElementById('eventPhotosGrid');
          ev.photos.forEach(url => {
            const div = document.createElement('div');
            div.className = 'aspect-video rounded-3xl overflow-hidden border border-slate-200 dark:border-slate-700 shadow-xl hover:scale-[1.02] transition-transform duration-300 group relative mb-4';
            div.innerHTML = `
              <img src="${url}" class="w-full h-full object-cover cursor-pointer">
              <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center pointer-events-none">
                 <div class="p-3 bg-white/20 backdrop-blur-md rounded-full text-white opacity-0 group-hover:opacity-100 transition-all transform translate-y-4 group-hover:translate-y-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                 </div>
              </div>
            `;
            grid.appendChild(div);
          });
        }

        // CTA buttons
        const ctaDiv = document.getElementById('ctaButtons');
        ctaDiv.innerHTML = '';
        ctaDiv.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3'; // 2 columns on larger screens
        if (ev.contacts && ev.contacts.length > 0) {
          ev.contacts.forEach(c => {
            ctaDiv.insertAdjacentHTML('beforeend', `
              <div class="glass-card p-3 rounded-2xl border border-slate-200/50 dark:border-slate-800/50 shadow-sm">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 ml-1 truncate">${c.name}</p>
                <div class="flex gap-2">
                  <a href="tel:${c.phone}" class="flex-1 flex items-center justify-center gap-2 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-xs font-bold rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    <span>Call</span>
                  </a>
                  <a href="https://wa.me/${c.phone}" target="_blank" class="flex-1 flex items-center justify-center gap-2 py-2 text-xs font-bold rounded-xl transition shadow-lg shadow-green-500/10" style="background:#25D366;color:white;">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.885-9.885 9.885m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    <span>WhatsApp</span>
                  </a>
                </div>
              </div>
            `);
          });
        }
      } catch(e) {
        window.location.href = '/calendar.html';
      }
    });

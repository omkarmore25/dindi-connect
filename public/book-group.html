<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LJLHH6R5TM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LJLHH6R5TM');
  </script>
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t === 'traditional') document.documentElement.classList.add('traditional');
      else if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    html.dark { background-color: #0f172a !important; }
    html.traditional { background-color: #1A3636 !important; }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Group - Vandan</title>
  <link href="/css/style.css?v=13" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
    body {
      background-image: radial-gradient(at 0% 0%, rgba(251,146,60,0.1) 0px, transparent 50%),
                        radial-gradient(at 100% 0%, rgba(234,88,12,0.1) 0px, transparent 50%);
      background-attachment: fixed;
      font-family: 'Outfit', sans-serif;
    }
    .dark body {
      background-image: radial-gradient(at 0% 0%, rgba(251,146,60,0.15) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(79,70,229,0.15) 0px, transparent 50%);
    }
    
    .dark 
    .premium-input {
      @apply w-full p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-brand-500 focus:outline-none transition-all text-slate-800 dark:text-slate-100 font-medium;
    }
  </style>
  
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased min-h-screen">

  <div class="max-w-3xl mx-auto px-4 py-12 md:py-20">
    <!-- Header -->
    <div class="mb-10 text-center">
      <a href="/" class="inline-flex items-center gap-2 text-brand-600 dark:text-brand-400 font-bold mb-6 hover:opacity-80 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Explorer
      </a>
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">Book <span id="targetGroupName" class="text-brand-500">Group</span></h1>
      <p class="text-slate-500 dark:text-slate-400 text-lg">Submit your request and the group leader will contact you shortly.</p>
    </div>

    <div id="loadingGroup" class="text-center py-12 animate-pulse text-slate-400 font-medium">
       Preparing booking form...
    </div>

    <!-- Booking Form Card -->
    <div id="bookingContainer" class="hidden glass-card p-16 md:p-24 shadow-2xl" style="border-radius: 48px !important;">
      <form id="fullBookingForm" class="space-y-6 mt-10">
        <div class="space-y-2">
          <label class="text-sm font-bold text-slate-500 dark:text-slate-400 ml-1 uppercase tracking-wider">Your Name</label>
          <input type="text" id="bName" class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-brand-500 focus:outline-none transition-all text-slate-800 dark:text-slate-100 font-medium" placeholder="Enter your full name" required>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-bold text-slate-500 dark:text-slate-400 ml-1 uppercase tracking-wider">Your WhatsApp Number</label>
          <input type="tel" id="bPhone" class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-brand-500 focus:outline-none transition-all text-slate-800 dark:text-slate-100 font-medium" placeholder="e.g. +91 9876543210" required>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-bold text-slate-500 dark:text-slate-400 ml-1 uppercase tracking-wider">Event Date</label>
          <input type="date" id="bDate" class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-brand-500 focus:outline-none transition-all text-slate-800 dark:text-slate-100 font-medium" required>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-bold text-slate-500 dark:text-slate-400 ml-1 uppercase tracking-wider">Purpose of Booking</label>
          <input type="text" id="bPurpose" class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-brand-500 focus:outline-none transition-all text-slate-800 dark:text-slate-100 font-medium" placeholder="e.g. Temple Inauguration, Wedding, Bhajan Sandhya..." required>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-bold text-slate-500 dark:text-slate-400 ml-1 uppercase tracking-wider">Additional Message</label>
          <textarea id="bMessage" rows="4" class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-brand-500 focus:outline-none transition-all text-slate-800 dark:text-slate-100 font-medium resize-none" placeholder="Tell the group about your event location, timings, or any special requests."></textarea>
        </div>

        <button type="submit" id="bSubmitBtn" class="w-full py-5 bg-gradient-to-r from-brand-500 to-orange-600 text-white font-extrabold text-xl rounded-2xl shadow-xl shadow-brand-500/30 hover:shadow-brand-500/50 transition-all transform hover:-translate-y-1 active:scale-[0.98] flex items-center justify-center gap-3 mt-4">
           Submit Booking Request
           <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l7-7m-7 7h18"></path></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- Mobile Floating Bottom Nav -->
  <nav class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass-nav mobile-bottom-nav rounded-3xl px-6 py-3 flex justify-between items-center shadow-xl transition-all duration-300 transform">
    <a href="/" class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-brand-500 transition">
      <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
      <span class="text-[10px] font-medium">Home</span>
    </a>
    <a href="/calendar.html" class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-brand-500 transition">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      <span class="text-[10px] font-medium">Calendar</span>
    </a>
    <a href="/dashboard.html" class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-brand-500 transition">
       <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
       <span class="text-[10px] font-medium">Dash</span>
    </a>
    <a href="/auth.html" class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-brand-500 transition">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      <span class="text-[10px] font-medium">Profile</span>
    </a>
    <a href="/contact.html" class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-brand-500 transition">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
      <span class="text-[10px] font-medium">Help</span>
    </a>
  </nav>

  <script src="/js/main.js?v=51.95"></script>
  
  
  
  <!-- PWA Install Banner (Mobile) -->
  <div id="installMobileBanner" class="hidden md:hidden fixed bottom-24 left-0 right-0 mx-auto w-[90%] max-w-sm glass-card p-4 rounded-2xl shadow-2xl border border-brand-200/50 dark:border-brand-500/30 animate-fade-in" style="z-index: 9999;">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-brand-500 to-orange-500 text-white flex items-center justify-center font-bold text-xl shrink-0 shadow-lg shadow-brand-500/20">V</div>
      <div class="flex-1 min-w-0">
        <h4 class="text-sm font-black text-slate-800 dark:text-slate-100">Install Vandan</h4>
        <p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium truncate">Fast, secure & offline access</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="dismissInstallBanner" class="p-2 text-slate-400 hover:text-slate-600 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <button id="installMobileBtn" class="px-4 py-2 bg-brand-500 text-white text-[10px] font-black rounded-lg shadow-lg shadow-brand-500/30">INSTALL</button>
      </div>
    </div>
  </div>
</body>
</html>
